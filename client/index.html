<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/aos.png" />
    <link rel="apple-touch-icon" href="/aos.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Ashmif Office Solutions — Software that ships</title>
    <meta
      name="description"
      content="Mombasa-based software studio building web apps, mobile apps, websites, and backends for businesses across Kenya and beyond."
    />
    <style>
      /* Boot loader — visually identical to <Spinner /> in dark mode */
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #0a0a0a;
        z-index: 9999;
        transition: opacity 0.3s ease;
        font-family:
          'Inter',
          system-ui,
          -apple-system,
          sans-serif;
      }

      #boot-loader.fade {
        opacity: 0;
        pointer-events: none;
      }

      #boot-loader .ring {
        width: 36px;
        height: 36px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }

      #boot-loader .label {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
        margin: 0;
        animation: boot-pulse 2s ease-in-out infinite;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" role="status" aria-label="Loading">
      <div class="ring"></div>
      <p class="label">Loading...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
